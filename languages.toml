# vtsls 서버 정의
[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]

# 전역 LSP 설정에서 vtsls를 사용하도록 지정
[[language]]
name = "typescript"
auto-format = true
language-servers = [ "vtsls" ]
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "javascript"
auto-format = true
language-servers = [ "vtsls" ]

[[language]]
name = "tsx"
auto-format = true
language-servers = [ "vtsls" ]

[[language]]
name = "jsx"
auto-format = true
language-servers = [ "vtsls" ]

